<body>
    <header>
         <h1><a href="index.html" class="velvet-header">Furry Baby</a></h1>
    </header>
        <nav>
            <ul>
                <li><a href="petwear.html">Petwear</a></li>
                <li><a href="toys.html">Playtime</a></li>
                <li><a href="essentials.html">Essentials</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
<main>
        <div class="section-header">
            <h2>We would love to hear from you!</h2>
        </div>
    <section>
        <div class="spacer-element"></div>
        <div class="contact">
            <form method="post" action="https://contact@furrybaby.com">
                <div class="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" name="myName" id="name" required>
                </div>
                <div class="contact-form">
                    <label for="email">E-mail:</label>
                    <input type="text" name="myEmail" id="email" required>
                </div>
                <div class="contact-form">
                    <label for="message">Message:</label>
                    <input type="text" name="myMessage" id="message">
                </div>
                <div class="contact-form">
                    <label>
                    <input type="checkbox" name="newsletter" id="newsletter">
                        Sign me up for the newsletter!
                    </label>
                </div>
                <div class="contact-form">
                    <button type="submit">Send Message</button>
                </div>
            </form>
        </div>
    </section>
</main>
    <footer>
        <p>Hyde Park Village</p>
        <p>Tampa, FL</p>
        <p>&copy; 2025 Furry Baby</p>
        <p><a href="mailto:contact@furrybaby.com">contact@furrybaby.com</a></p>
    </footer>
